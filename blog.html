<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (function () {
        var lk = "kins-language";
        var storedLang = localStorage.getItem(lk);
        function pickLang() {
          if (storedLang === "de" || storedLang === "en") return storedLang;
          var list =
            typeof navigator.languages !== "undefined" && navigator.languages.length
              ? Array.prototype.slice.call(navigator.languages)
              : [navigator.language || ""];
          for (var i = 0; i < list.length; i++) {
            var t = String(list[i]).toLowerCase();
            if (t.indexOf("de") === 0) return "de";
            if (t.indexOf("en") === 0) return "en";
          }
          return "de";
        }
        document.documentElement.lang = pickLang();
        var tk = "kins-theme";
        var storedTheme = localStorage.getItem(tk);
        if (storedTheme !== "light" && storedTheme !== "dark" && window.matchMedia) {
          document.documentElement.style.colorScheme = window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
        }
      })();
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=overlays-content"
    />
    <meta id="theme-color-meta" name="theme-color" content="#060a12" />
    <title>Blog | KI Netzwerk Schweinfurt</title>
    <meta name="description" content="Blogbeiträge des KI Netzwerk Schweinfurt" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400..800;1,400..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <script defer src="./assets/js/main.js"></script>
  </head>
  <body data-page="blog">
    <div id="site-header"></div>

    <main class="page-main container">
      <header class="page-head fade-in">
        <h1 data-i18n="blog.title"></h1>
        <p data-i18n="blog.subtitle"></p>
      </header>

      <section id="blog-list-view" class="fade-in">
        <div id="blog-list" class="blog-cards-grid"></div>
      </section>

      <article id="blog-detail-view" class="blog-detail hidden fade-in">
        <a class="link" href="./blog.html" data-i18n="blog.detail.backToList"></a>
        <header class="blog-detail-head">
          <h2 id="blog-detail-title"></h2>
          <p id="blog-detail-date" class="card-date"></p>
          <p id="blog-detail-readtime" class="blog-detail-readtime hidden"></p>
        </header>
        <img id="blog-detail-image" class="blog-detail-image hidden" alt="" />
        <div id="blog-detail-content" class="markdown-layer markdown-content"></div>
      </article>
    </main>

    <div id="site-footer"></div>
  </body>
</html>

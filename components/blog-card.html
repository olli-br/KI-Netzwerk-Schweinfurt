<article class="card blog-card blog-card--feature">
  <a class="card-hitbox" href="./blog.html?post={{slug}}" aria-label="{{title}}"></a>
  <div class="blog-card__media">
    <div class="thumb-wrap">
      <img class="card-image" src="{{image}}" alt="{{title}}" loading="lazy" />
      <span class="blog-image-gradient" aria-hidden="true"></span>
      <span class="blog-card__recap-pill">{{recapBadge}}</span>
    </div>
  </div>
  <div class="card-body blog-card__body">
    <div class="blog-card-meta">
      <p class="card-date blog-card__date" title="{{absoluteDate}}">{{absoluteDate}}</p>
      <span class="blog-readtime">{{readTime}}</span>
    </div>
    <h3>{{title}}</h3>
    <p class="blog-teaser">{{teaser}}</p>
    <div class="card-actions">
      <a class="btn btn-ghost" href="./blog.html?post={{slug}}">{{readMore}}</a>
    </div>
  </div>
</article>

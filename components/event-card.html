<article class="card event-card event-card--modern{{pastClass}}{{nextClass}}">
  <a class="card-hitbox" href="{{detailUrl}}" aria-label="{{title}}"></a>
  <div class="event-card__media">
    <img class="event-card__image" src="{{image}}" alt="{{title}}" loading="lazy" />
    <div class="event-card__date-badge" aria-hidden="true">
      <span class="event-card__date-day">{{dateBadgeDay}}</span>
      <span class="event-card__date-month">{{dateBadgeMonth}}</span>
    </div>
    {{statusBadgeHtml}}
  </div>
  <div class="card-body event-card__body">
    <p class="event-card__datetime">{{date}}</p>
    <h3>{{title}}</h3>
    <p class="event-card__desc">{{description}}</p>
    {{countdownBlock}}
    {{addressBlock}}
    <div class="card-actions">
      <a class="btn btn-ghost" href="{{detailUrl}}">{{buttonText}}</a>
      <a class="btn btn-primary" href="{{registerUrl}}" target="_blank" rel="noopener noreferrer">{{registerText}}</a>
    </div>
  </div>
</article>

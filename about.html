<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (function () {
        var lk = "kins-language";
        var storedLang = localStorage.getItem(lk);
        function pickLang() {
          if (storedLang === "de" || storedLang === "en") return storedLang;
          var list =
            typeof navigator.languages !== "undefined" && navigator.languages.length
              ? Array.prototype.slice.call(navigator.languages)
              : [navigator.language || ""];
          for (var i = 0; i < list.length; i++) {
            var t = String(list[i]).toLowerCase();
            if (t.indexOf("de") === 0) return "de";
            if (t.indexOf("en") === 0) return "en";
          }
          return "de";
        }
        document.documentElement.lang = pickLang();
        var tk = "kins-theme";
        var storedTheme = localStorage.getItem(tk);
        if (storedTheme !== "light" && storedTheme !== "dark" && window.matchMedia) {
          document.documentElement.style.colorScheme = window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
        }
      })();
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=overlays-content"
    />
    <meta id="theme-color-meta" name="theme-color" content="#060a12" />
    <title>Über uns | KI Netzwerk Schweinfurt</title>
    <meta
      name="description"
      content="KI Netzwerk Schweinfurt: Treffen, Zielgruppe und Partner der Initiative für KI in der Region."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400..800;1,400..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <script defer src="./assets/js/main.js"></script>
  </head>
  <body data-page="about">
    <div id="site-header"></div>

    <main class="page-main about-page container">
      <header class="about-hero fade-in">
        <p class="about-eyebrow" id="about-eyebrow"></p>

      </header>

      <section class="about-initiators fade-in" id="about-initiators-section">
        <p class="about-eyebrow" id="about-initiators-eyebrow"></p>
        <div id="about-initiators-container"></div>

      <section class="about-panel fade-in" aria-labelledby="about-meeting-title">
        <h2 class="about-panel__title" id="about-meeting-title"></h2>
        <p class="about-panel__lead" id="about-meeting-lead"></p>
        <div class="about-prose" id="about-meeting-body"></div>
      </section>

      <section class="about-panel about-panel--accent fade-in" aria-labelledby="about-participants-title">
        <h2 class="about-panel__title" id="about-participants-title"></h2>
        <p class="about-panel__lead" id="about-participants-lead"></p>

      </section>

      <section class="about-panel about-panel--partners fade-in" aria-labelledby="about-partners-title">
        <h2 class="about-panel__title" id="about-partners-title"></h2>
        <p class="about-panel__text" id="about-partners-text"></p>
        <div id="about-partner-logos" class="about-partner-logos">
          <a class="about-partner-logo" href="https://schweinfurt-fabulous.de/schweinfurt-fabulous/studyfab" target="_blank" rel="noopener noreferrer">
            <img src="./assets/images/StudyFAB_Logo.jpeg" alt="StudyFAB" loading="lazy" />

        </div>
        <div id="about-partner-chips" class="about-chip-row about-chip-row--muted"></div>

    <div id="site-footer"></div>

</html>

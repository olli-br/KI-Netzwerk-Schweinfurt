<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Über uns | Ki Netzwerk Schweinfurt</title>
    <meta
      name="description"
      content="Ki Netzwerk Schweinfurt: Treffen, Zielgruppe und Partner der Initiative für KI in der Region."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <script defer src="./assets/js/i18n.js"></script>

  <body data-page="about">

    <main class="page-main about-page container">
      <header class="about-hero fade-in">
        <p class="about-eyebrow" id="about-eyebrow"></p>
        <h1 class="about-title" id="about-title"></h1>

      <section class="about-panel about-panel--partners fade-in" aria-labelledby="about-partners-title">
        <h2 class="about-panel__title" id="about-partners-title"></h2>
        <p class="about-panel__text" id="about-partners-text"></p>
